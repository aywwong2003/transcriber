<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Transcriber Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .mic-meter-container { height: 6px; background: #e2e8f0; border-radius: 3px; overflow: hidden; width: 100%; }
        #micMeter { height: 100%; width: 0%; background: #3b82f6; transition: width 0.1s ease-out; }
        #debugConsole { font-family: monospace; font-size: 10px; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-4 flex flex-col items-center justify-center">

    <div class="bg-white w-full max-w-lg rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
        <div class="bg-slate-900 p-5 text-white flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold">Transcriber</h1>
                <p class="text-slate-400 text-xs">Mobile Test Build</p>
            </div>
            <div id="connectionStatus" class="w-3 h-3 rounded-full bg-slate-600"></div>
        </div>

        <div class="p-5 space-y-4">
            <!-- Mic Test -->
            <div class="bg-slate-50 p-3 rounded-lg border border-slate-200">
                <div class="flex justify-between text-[10px] font-bold text-slate-500 uppercase mb-1">
                    <span>Mic Input Level</span>
                    <span id="meterLabel">Ready</span>
                </div>
                <div class="mic-meter-container">
                    <div id="micMeter"></div>
                </div>
            </div>

            <!-- Language & Start -->
            <div class="grid grid-cols-1 gap-3">
                <select id="languageSelect" class="w-full p-3 bg-white border border-slate-300 rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="en-US">English (US)</option>
                    <option value="zh-HK">Cantonese (香港)</option>
                    <option value="zh-CN">Mandarin (中国)</option>
                </select>
                
                <button id="toggleBtn" class="w-full py-4 bg-blue-600 active:bg-blue-800 text-white font-bold rounded-xl shadow-lg transition-all flex items-center justify-center gap-2">
                    <span id="btnIcon">🎤</span>
                    <span id="btnText">Start Transcription</span>
                </button>
            </div>

            <!-- Transcription Area -->
            <div id="output" class="w-full min-h-[150px] p-4 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-700 leading-relaxed whitespace-pre-wrap italic">
                Waiting for speech...
            </div>

            <!-- Mobile Debug Logs (Hidden by default, useful for troubleshooting) -->
            <details class="mt-2">
                <summary class="text-[10px] text-slate-400 cursor-pointer uppercase font-bold tracking-widest">System Logs</summary>
                <div id="debugConsole" class="mt-2 p-2 bg-black text-green-400 rounded max-h-32 overflow-y-auto">
                    > System initialized.
                </div>
            </details>
        </div>
    </div>

    <script>
        const debug = (msg) => {
            const consoleEl = document.getElementById('debugConsole');
            consoleEl.innerHTML += `<div>> ${msg}</div>`;
            consoleEl.scrollTop = consoleEl.scrollHeight;
        };

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const toggleBtn = document.getElementById('toggleBtn');
        const output = document.getElementById('output');
        const micMeter = document.getElementById('micMeter');
        const connectionStatus = document.getElementById('connectionStatus');

        let isRecording = false;
        let recognition;
        let audioCtx, analyser, stream;

        // 1. Setup Audio Meter (Local processing)
        async function initMicMeter() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                const source = audioCtx.createMediaStreamSource(stream);
                const processor = audioCtx.createScriptProcessor(2048, 1, 1);

                source.connect(analyser);
                analyser.connect(processor);
                processor.connect(audioCtx.destination);

                processor.onaudioprocess = () => {
                    const data = new Uint8Array(analyser.frequencyBinCount);
                    analyser.getByteFrequencyData(data);
                    const avg = data.reduce((a, b) => a + b) / data.length;
                    micMeter.style.width = Math.min(100, avg * 2.5) + '%';
                };
                debug("Mic hardware linked to meter.");
            } catch (e) {
                debug(`Mic Error: ${e.message}`);
                document.getElementById('meterLabel').innerText = "Access Denied";
            }
        }

        // 2. Setup Transcription (Server processing)
        if (!SpeechRecognition) {
            debug("Critical: SpeechRecognition API not found.");
            output.innerText = "Error: This browser doesn't support transcription. Please use Chrome or Safari.";
        } else {
            recognition = new SpeechRecognition();
            // MOBILE FIX: Some phones fail if continuous is true
            recognition.continuous = true; 
            recognition.interimResults = true;

            recognition.onstart = () => {
                isRecording = true;
                connectionStatus.className = "w-3 h-3 rounded-full bg-green-500 animate-pulse";
                document.getElementById('btnText').innerText = "Stop Recording";
                toggleBtn.classList.replace('bg-blue-600', 'bg-red-600');
                debug("Service: Listening (Connected to cloud)");
            };

            recognition.onresult = (event) => {
                let final = "";
                let interim = "";
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) final += event.results[i][0].transcript;
                    else interim += event.results[i][0].transcript;
                }
                output.innerHTML = `<span>${final}</span><span class="text-blue-500">${interim}</span>`;
            };

            recognition.onerror = (e) => {
                debug(`Service Error: ${e.error}`);
                if (e.error === 'network') debug("TIP: Check your internet connection.");
                if (e.error === 'no-speech') debug("TIP: Try speaking closer to the mic.");
                stop();
            };

            recognition.onend = () => {
                debug("Service disconnected.");
                if (isRecording) recognition.start(); // Auto-restart for mobile
            };
        }

        function stop() {
            isRecording = false;
            recognition.stop();
            connectionStatus.className = "w-3 h-3 rounded-full bg-slate-600";
            document.getElementById('btnText').innerText = "Start Transcription";
            toggleBtn.classList.replace('bg-red-600', 'bg-blue-600');
        }

        toggleBtn.addEventListener('click', () => {
            if (isRecording) stop();
            else {
                recognition.lang = document.getElementById('languageSelect').value;
                recognition.start();
            }
        });

        // Initialize mic meter on load
        window.addEventListener('load', initMicMeter);
    </script>
</body>
</html>
